---
services:
  container-manager-agent:
    # image: docker.io/knucklessg1/container-manager:latest
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: container-manager-agent
    hostname: container-manager-agent
    command: [ "container-manager-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9696"
      - "TRANSPORT=stdio"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-google/gemma-4-31b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
      - "SYSTEM_TOOLS_ENABLE=False"
      - "SYSTEMS_MANAGER_ENABLE=False"
      - "WEBSITE_BUILDER_ENABLE=False"
      - "WEB_ARTIFACTS_ENABLE=False"
      - "SECURITY_TOOLS_ENABLE=False"
      - "DEVELOPER_UTILITIES_ENABLE=False"
      - "BROWSER_TOOLS_ENABLE=False"
    ports:
      - "9696:9696"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9696/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
